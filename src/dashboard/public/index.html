<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>glassbox</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <div class="brand">🔍 glassbox <span class="sub" data-i18n="brandSub">实时工作面板</span></div>
      <div class="head-right">
        <button id="lang-toggle" class="lang" title="中文 / English">EN</button>
        <div class="conn" id="conn">…</div>
      </div>
    </header>

    <section class="stats" id="stats">
      <div class="stat"><label data-i18n="statModel">Provider / Model</label><b id="s-model">—</b></div>
      <div class="stat"><label data-i18n="statTurn">轮数 (turn)</label><b id="s-turn">0</b></div>
      <div class="stat"><label data-i18n="statTok">累计 token</label><b id="s-tok">0</b></div>
      <div class="stat"><label data-i18n="statCost">累计成本</label><b id="s-cost">$0</b></div>
      <div class="stat ctx">
        <label data-i18n="statCtx">上下文占用（最近一次调用）</label>
        <div class="gauge"><div id="ctx-bar"></div></div>
        <span id="ctx-text">—</span>
      </div>
    </section>

    <main>
      <div class="panel timeline">
        <h2><span data-i18n="panelTimeline">① 对话流</span></h2>
        <div id="timeline" class="scroll"></div>
      </div>

      <div class="col">
        <div class="panel">
          <h2><span data-i18n="panelLlm">② LLM 调用</span> <span class="hint" data-i18n="panelLlmHint">点开看原始报文 → 对比 provider</span></h2>
          <div id="llm" class="scroll"></div>
        </div>
        <div class="panel">
          <h2><span data-i18n="panelTools">③ 工具调用</span></h2>
          <div id="tools" class="scroll"></div>
        </div>
        <div class="panel">
          <h2><span data-i18n="panelTree">⑤ 多 Agent 协作树</span></h2>
          <div id="tree" class="scroll"></div>
        </div>
      </div>
    </main>

    <div id="modal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <div>
            <div id="modal-title" class="modal-title">—</div>
            <div id="modal-meta" class="modal-meta"></div>
          </div>
          <button id="modal-close" class="modal-close">✕</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
